name: RSS Feed Sync

on:
  # Run manually or on schedule
  workflow_dispatch:
  # Uncomment for daily runs
  # schedule:
  #   - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  sync-rss:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install axios jsdom

      - name: Fetch and parse RSS feeds
        run: |
          node << 'EOF'
          const axios = require('axios');
          const { JSDOM } = require('jsdom');
          const fs = require('fs');
          
          const RSS_URL = 'https://kougabusinessforum.com/rss';
          const NEWS_URL = 'https://kougabusinessforum.com/chairmans-updates/';
          const SECRET_KEY = process.env.RSS_SECRET_KEY;
          
          // Function to parse RSS feed
          function parseRSS(url) {
            return axios.get(url, {
              headers: {
                'Authorization': `Bearer ${SECRET_KEY}`
              }
            })
              .then(response => {
                const dom = new JSDOM(response.data);
                const parser = new DOMParser();
                const doc = parser.parseFromString(dom.window.document.documentElement.outerHTML, 'text/html');
                
                const items = doc.querySelectorAll('item');
                const articles = [];
                
                items.forEach(item => {
                  articles.push({
                    title: item.querySelector('title')?.textContent || '',
                    link: item.querySelector('link')?.textContent || '',
                    pubDate: item.querySelector('pubDate')?.textContent || '',
                    content: item.querySelector('description')?.textContent || ''
                  });
                });
                
                return articles;
              });
          }
          
          // Fetch RSS feeds
          Promise.all([
            parseRSS(RSS_URL),
            parseRSS(NEWS_URL)
          ])
          .then(([events, news]) => {
            // Save events
            const output = {
              lastUpdated: new Date().toISOString(),
              source: RSS_URL,
              events
            };
            fs.writeFileSync('events.json', JSON.stringify(output, null, 2));
            console.log(`✓ Saved ${events.length} events`);
            
            // Save news
            const newsOutput = {
              lastUpdated: new Date().toISOString(),
              source: NEWS_URL,
              articles: news
            };
            fs.writeFileSync('news.json', JSON.stringify(newsOutput, null, 2));
            console.log(`✓ Saved ${news.length} news articles`);
          })
          .catch(error => {
            console.error('Error fetching RSS feeds:', error.message);
            process.exit(1);
          });
          EOF

      - name: Commit changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add events.json news.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync RSS feeds: Update events and news data"
            git push
          fi

      - name: Output file sizes
        run: |
          if [ -f events.json ]; then
            echo "Events file:"
            ls -lh events.json
          fi
          if [ -f news.json ]; then
            echo "News file:"
            ls -lh news.json
          else
            echo "⚠️  Files not created - check logs above"
          fi
