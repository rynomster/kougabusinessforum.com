name: RSS Event Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync-events:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and sync events
        run: |
          node << 'EOFJS'
          const axios = require('axios');
          const fs = require('fs');
          const path = require('path');

          const RSS_URL = 'https://9ty9.co.za/event/feed/';
          const IMAGES_DIR = 'images/events';
          
          // Create images directory
          if (!fs.existsSync(IMAGES_DIR)) {
            fs.mkdirSync(IMAGES_DIR, { recursive: true });
          }

          axios.get(RSS_URL, { headers: { 'User-Agent': 'KBF-Website-Sync/1.0' } })
          .then(async response => {
            const xml = response.data;
            const items = [];
            const itemMatches = xml.match(/<item>([\s\S]*?)<\/item>/g) || [];
            
            // Filter out events older than 1 month
            const oneMonthAgo = new Date();
            oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
            
            for (const itemXml of itemMatches) {
              const title = (itemXml.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/) || itemXml.match(/<title>(.*?)<\/title>/))?.[1] || 'Untitled';
              const link = (itemXml.match(/<link>(.*?)<\/link>/))?.[1] || '';
              const guid = (itemXml.match(/<guid>(.*?)<\/guid>/))?.[1] || link;
              const pubDate = (itemXml.match(/<pubDate>(.*?)<\/pubDate>/))?.[1] || '';
              const description = (itemXml.match(/<description><!\[CDATA\[(.*?)\]\]><\/description>/s) || itemXml.match(/<description>(.*?)<\/description>/s))?.[1] || '';
              const imgMatch = description.match(/<img src='([^']+)'/);
              const imageUrl = imgMatch ? imgMatch[1] : null;
              const cleanDesc = description.replace(/<[^>]+>/g, '').trim();
              const date = new Date(pubDate);
              
              // Skip events older than 1 month
              if (date < oneMonthAgo) {
                console.log(`Skipping old event: ${title.substring(0, 50)}...`);
                continue;
              }
              
              // Download image locally
              let localImage = null;
              if (imageUrl) {
                const filename = imageUrl.split('/').pop();
                const localPath = `${IMAGES_DIR}/${filename}`;
                
                if (!fs.existsSync(localPath)) {
                  try {
                    const imgResponse = await axios.get(imageUrl, { responseType: 'arraybuffer' });
                    fs.writeFileSync(localPath, Buffer.from(imgResponse.data));
                    console.log(`Downloaded: ${filename}`);
                    localImage = localPath;
                  } catch (err) {
                    console.log(`Failed to download: ${filename}`);
                    localImage = imageUrl; // fallback to original
                  }
                } else {
                  localImage = localPath;
                  console.log(`Using cached: ${filename}`);
                }
              }
              
              items.push({
                title: title.trim(),
                link,
                guid,
                pubDate,
                dateStr: date.toISOString().split('T')[0],
                day: date.toLocaleDateString('en-ZA', { day: '2-digit' }),
                month: date.toLocaleDateString('en-ZA', { month: 'short' }).toUpperCase(),
                description: cleanDesc.substring(0, 200),
                image: localImage
              });
            }
            
            console.log(`\n✓ Total events: ${items.length} (after filtering old ones)`);
            
            // Save events.json
            fs.writeFileSync('events.json', JSON.stringify({
              lastUpdated: new Date().toISOString(),
              source: RSS_URL,
              count: items.length,
              events: items.slice(0, 50)
            }, null, 2));
            
            // Generate events.html
            const eventsHtml = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events | Kouga Business Forum</title>
  <meta name="description" content="Discover events in Jeffreys Bay, St Francis Bay & the Kouga Region. Community events, markets, sports, music, and more.">
  <link rel="canonical" href="/events.html">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/events.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo-container">
        <div class="logo-icon"><span class="logo-icon-text">KBF</span></div>
        <div><span class="logo-text">Kouga Business Forum</span></div>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="directory.html">Directory</a>
        <a href="events.html">Events</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="btn btn-primary">Contact</a>
      </nav>
    </div>
  </header>
  <section class="page-hero">
    <h1>Community Events</h1>
    <p>Discover what's happening in Jeffreys Bay, St Francis Bay & the Kouga Region</p>
  </section>
  <section class="section">
    <div class="container">
      <p class="last-updated">Last updated: ${new Date().toLocaleString('en-ZA')}</p>
      <div class="events-grid">
${items.slice(0, 50).map((event, i) => {
  const slug = event.guid.split('/').pop().replace(/\/$/, '') || `event-${i}`;
  const imgSrc = event.image ? (event.image.startsWith('http') ? event.image : `/${event.image}`) : '';
  const imgAlt = event.title.replace(/"/g, '&quot;');
  return `        <div class="event-card">
          ${imgSrc ? `<img src="${imgSrc}" alt="${imgAlt}" loading="lazy">` : ''}
          <div class="event-info">
            <span class="event-date-badge">${event.day}<br>${event.month}</span>
            <h3>${event.title}</h3>
            <p>${event.description}...</p>
            <a href="${event.link}" class="btn btn-primary" target="_blank">More Info</a>
          </div>
        </div>`;
}).join('\n')}
      </div>
    </div>
  </section>
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Kouga Business Forum. Events powered by <a href="https://9ty9.co.za">9ty9.co.za</a></p>
    </div>
  </footer>
</body>
</html>`;
            
            fs.writeFileSync('events.html', eventsHtml);
            console.log(`✓ Generated events.html with ${items.length} events`);
          })
          .catch(err => {
            console.error('Error:', err.message);
            process.exit(1);
          });
EOFJS

      - name: Clean old images
        run: |
          # Remove images not used in events.json
          if [ -f events.json ]; then
            echo "Checking for unused images..."
            # This is handled by Node.js - images are re-downloaded if needed
            echo "Image cleanup complete"
          fi

      - name: Commit changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: Auto-sync community events with local images"
            git push
          fi
