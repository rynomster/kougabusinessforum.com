name = "kbf-submissions-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables - set via Wrangler dashboard or .env
[vars]
ADMIN_EMAIL = "office@kougabusinessforum.com"
ADMIN_PHONE = "063 902 1597"
KBF_WEBSITE = "https://new.kougabusinessforum.com"

# HTTP routes must include a full hostname pattern.
# zone_name should be the Cloudflare DNS zone (apex), not a subdomain.
[[routes]]
pattern = "new.kougabusinessforum.com/api/*"
zone_name = "kougabusinessforum.com"

[[routes]]
pattern = "new.kougabusinessforum.com/rss"
zone_name = "kougabusinessforum.com"
